<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUND · FIELD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07080a;
    --grid: rgba(255,255,255,0.03);
    --dot-core: #e8ff47;
    --dot-mid: rgba(232,255,71,0.25);
    --dot-outer: rgba(232,255,71,0.04);
    --text: rgba(255,255,255,0.55);
    --accent: #e8ff47;
    --mono: 'Space Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    overflow: hidden;
    user-select: none;
  }

  /* scanline grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* crosshair grid */
  .grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* corner brackets */
  .bracket {
    position: fixed;
    width: 32px; height: 32px;
    opacity: 0.3;
  }
  .bracket--tl { top: 24px; left: 24px; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
  .bracket--tr { top: 24px; right: 24px; border-top: 1px solid var(--accent); border-right: 1px solid var(--accent); }
  .bracket--bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--accent); border-left: 1px solid var(--accent); }
  .bracket--br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }

  /* header */
  .header {
    position: fixed;
    top: 28px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 12px;
    z-index: 10;
  }
  .header h1 {
    font-family: var(--display);
    font-size: 13px;
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.2);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #444;
    transition: background 0.4s;
  }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  /* center stage */
  .stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }

  /* the dot system */
  .dot-wrap {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    width: 0; height: 0;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    top: 0; left: 0;
    pointer-events: none;
    transition: none;
  }

  .ring-outer {
    background: var(--dot-outer);
    width: 0; height: 0;
    transition: width 0.08s ease-out, height 0.08s ease-out, opacity 0.08s;
  }

  .ring-mid {
    background: var(--dot-mid);
    width: 0; height: 0;
    transition: width 0.06s ease-out, height 0.06s ease-out;
  }

  .ring-core {
    background: var(--dot-core);
    width: 8px; height: 8px;
    box-shadow:
      0 0 6px var(--dot-core),
      0 0 18px rgba(232,255,71,0.6);
    transition: width 0.04s ease-out, height 0.04s ease-out, box-shadow 0.04s;
  }

  /* crosshair lines emanating from center */
  .crosshair-h, .crosshair-v {
    position: absolute;
    background: rgba(232,255,71,0.06);
    pointer-events: none;
    transform: translate(-50%, -50%);
    top: 0; left: 0;
    transition: opacity 0.3s;
  }
  .crosshair-h { width: 100vw; height: 1px; }
  .crosshair-v { width: 1px; height: 100vh; }

  /* db readout */
  .readout {
    position: fixed;
    bottom: 36px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    z-index: 10;
  }
  .db-value {
    font-family: var(--display);
    font-size: 48px;
    line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(232,255,71,0.4);
    letter-spacing: 0.05em;
    transition: color 0.1s;
    min-width: 3ch;
    text-align: center;
  }
  .db-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.2);
  }

  /* left sidebar: level bar */
  .level-bar-wrap {
    position: fixed;
    left: 32px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    height: 200px;
    z-index: 10;
  }
  .level-bar-track {
    width: 2px; flex: 1;
    background: rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
  }
  .level-bar-fill {
    position: absolute;
    bottom: 0; left: 0; width: 100%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    height: 0%;
    transition: height 0.05s ease-out;
  }
  .level-bar-label {
    font-size: 8px;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.15);
    writing-mode: vertical-rl;
    text-orientation: mixed;
  }

  /* right sidebar: frequency band mini bars */
  .freq-wrap {
    position: fixed;
    right: 32px; top: 50%; transform: translateY(-50%);
    display: flex; gap: 3px; align-items: flex-end;
    height: 80px;
    z-index: 10;
  }
  .freq-bar {
    width: 3px;
    background: rgba(232,255,71,0.3);
    border-radius: 1px;
    transition: height 0.06s ease-out;
    height: 2px;
  }

  /* start button */
  .start-btn {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: transparent;
    border: 1px solid rgba(232,255,71,0.4);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.35em;
    padding: 14px 28px;
    cursor: pointer;
    z-index: 50;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    text-transform: uppercase;
  }
  .start-btn:hover {
    background: rgba(232,255,71,0.07);
    border-color: var(--accent);
    box-shadow: 0 0 24px rgba(232,255,71,0.15);
  }
  .start-btn.hidden { display: none; }

  /* peak indicator tick */
  .peak-tick {
    position: fixed;
    left: 30px;
    width: 6px; height: 1px;
    background: rgba(232,255,71,0.6);
    transition: top 0.3s ease-out, opacity 0.5s;
    opacity: 0;
    z-index: 10;
  }

  /* history trail on canvas behind */
  canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="grid"></div>
<div class="bracket bracket--tl"></div>
<div class="bracket bracket--tr"></div>
<div class="bracket bracket--bl"></div>
<div class="bracket bracket--br"></div>

<div class="header">
  <div class="status-dot" id="statusDot"></div>
  <h1>SOUND · FIELD</h1>
  <div class="status-dot" id="statusDot2"></div>
</div>

<canvas id="trailCanvas"></canvas>

<div class="stage">
  <div class="dot-wrap" id="dotWrap">
    <div class="crosshair-h"></div>
    <div class="crosshair-v"></div>
    <div class="ring ring-outer" id="ringOuter"></div>
    <div class="ring ring-mid" id="ringMid"></div>
    <div class="ring ring-core" id="ringCore"></div>
  </div>
</div>

<div class="level-bar-wrap">
  <div class="level-bar-label">LEVEL</div>
  <div class="level-bar-track">
    <div class="level-bar-fill" id="levelFill"></div>
  </div>
</div>
<div class="peak-tick" id="peakTick"></div>

<div class="freq-wrap" id="freqWrap"></div>

<div class="readout">
  <div class="db-value" id="dbValue">—</div>
  <div class="db-label">AMPLITUDE · RMS</div>
</div>

<button class="start-btn" id="startBtn">◉ &nbsp; ACTIVATE MIC</button>

<script>
(function() {
  const startBtn = document.getElementById('startBtn');
  const statusDot = document.getElementById('statusDot');
  const statusDot2 = document.getElementById('statusDot2');
  const ringOuter = document.getElementById('ringOuter');
  const ringMid = document.getElementById('ringMid');
  const ringCore = document.getElementById('ringCore');
  const levelFill = document.getElementById('levelFill');
  const dbValue = document.getElementById('dbValue');
  const peakTick = document.getElementById('peakTick');
  const freqWrap = document.getElementById('freqWrap');
  const canvas = document.getElementById('trailCanvas');
  const ctx = canvas.getContext('2d');

  // build frequency mini bars
  const NUM_FREQ = 12;
  const freqBars = [];
  for (let i = 0; i < NUM_FREQ; i++) {
    const b = document.createElement('div');
    b.className = 'freq-bar';
    freqWrap.appendChild(b);
    freqBars.push(b);
  }

  // resize canvas
  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  let audioCtx, analyser, source, dataArray, freqArray;
  let peakLevel = 0;
  let peakTimer = null;
  let running = false;
  const SMOOTHING = 0.82;
  let smoothRms = 0;

  // history trail
  const CX = () => window.innerWidth / 2;
  const CY = () => window.innerHeight / 2;
  const history = [];
  const MAX_HISTORY = 80;

  startBtn.addEventListener('click', async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0.75;
      source = audioCtx.createMediaStreamSource(stream);
      source.connect(analyser);
      dataArray = new Uint8Array(analyser.fftSize);
      freqArray = new Uint8Array(analyser.frequencyBinCount);
      running = true;
      startBtn.classList.add('hidden');
      statusDot.classList.add('active');
      statusDot2.classList.add('active');
      loop();
    } catch(e) {
      startBtn.textContent = '⚠  MIC DENIED';
      startBtn.style.borderColor = 'rgba(255,80,80,0.6)';
      startBtn.style.color = '#ff5050';
    }
  });

  // level bar track height for peak calculation
  function getLevelBarTop() {
    const wrap = document.querySelector('.level-bar-wrap');
    const rect = wrap.getBoundingClientRect();
    return rect.top;
  }
  function getLevelBarHeight() {
    return 200;
  }

  function loop() {
    if (!running) return;
    requestAnimationFrame(loop);

    // time domain RMS
    analyser.getByteTimeDomainData(dataArray);
    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) {
      const v = (dataArray[i] - 128) / 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / dataArray.length);
    smoothRms = smoothRms * SMOOTHING + rms * (1 - SMOOTHING);

    const level = Math.min(smoothRms * 6, 1); // 0–1
    const pct = Math.round(level * 100);

    // dot sizing
    const coreSize = 8 + level * 80;
    const midSize  = coreSize * 2.2;
    const outerSize = coreSize * 4.5;

    ringCore.style.width  = coreSize + 'px';
    ringCore.style.height = coreSize + 'px';
    ringCore.style.boxShadow = `0 0 ${coreSize * 0.5}px #e8ff47, 0 0 ${coreSize * 1.5}px rgba(232,255,71,${0.3 + level * 0.5})`;
    ringMid.style.width   = midSize + 'px';
    ringMid.style.height  = midSize + 'px';
    ringOuter.style.width  = outerSize + 'px';
    ringOuter.style.height = outerSize + 'px';
    ringOuter.style.opacity = 0.04 + level * 0.18;

    // level bar
    levelFill.style.height = (level * 100) + '%';

    // db readout (pseudo-dB from RMS)
    if (smoothRms > 0.001) {
      const db = Math.round(20 * Math.log10(smoothRms));
      const clamped = Math.max(-60, Math.min(0, db));
      dbValue.textContent = clamped;
      dbValue.style.color = level > 0.75 ? '#ff6b47' : '#e8ff47';
    } else {
      dbValue.textContent = '—';
    }

    // peak tick
    if (level > peakLevel) {
      peakLevel = level;
      clearTimeout(peakTimer);
      peakTimer = setTimeout(() => { peakLevel = 0; }, 2000);
    }
    // map peak level to position within the bar track
    const barWrapEl = document.querySelector('.level-bar-wrap');
    const barRect = barWrapEl.getBoundingClientRect();
    const barTop = barRect.top + 8; // small offset for label
    const barH = barRect.height - 30;
    const peakY = barTop + barH * (1 - peakLevel);
    peakTick.style.top = peakY + 'px';
    peakTick.style.opacity = peakLevel > 0.02 ? '0.8' : '0';

    // frequency bands
    analyser.getByteFrequencyData(freqArray);
    const binStep = Math.floor(freqArray.length / NUM_FREQ);
    for (let i = 0; i < NUM_FREQ; i++) {
      let avg = 0;
      for (let j = 0; j < binStep; j++) avg += freqArray[i * binStep + j];
      avg /= (binStep * 255);
      const h = Math.max(2, avg * 80);
      freqBars[i].style.height = h + 'px';
    }

    // trail
    history.push({ level, t: Date.now() });
    if (history.length > MAX_HISTORY) history.shift();
    drawTrail();
  }

  function drawTrail() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (history.length < 2) return;
    const cx = CX(), cy = CY();
    const now = Date.now();

    for (let i = 1; i < history.length; i++) {
      const pt = history[i];
      const age = (now - pt.t) / 2000; // 0=new 1=old
      const alpha = (1 - age) * 0.15 * pt.level;
      if (alpha <= 0) continue;
      const r = 8 + pt.level * 80;
      const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2.5);
      gradient.addColorStop(0, `rgba(232,255,71,${alpha})`);
      gradient.addColorStop(1, `rgba(232,255,71,0)`);
      ctx.beginPath();
      ctx.arc(cx, cy, r * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
    }
  }
})();
</script>
</body>
</html>
